databaseChangeLog:
  - changeSet:
      id: 003
      author: vyacheslav
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: user_roles
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_roles_user
                    references: users(id)
                    onDelete: CASCADE
                    onUpdate: RESTRICT
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_roles_role
                    references: roles(id)
                    onDelete: CASCADE
                    onUpdate: RESTRICT
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles